name: Build Boykisser Executables

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev]
  workflow_dispatch:
    inputs:
      release:
        description: "Create release with binaries"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: read
  attestations: write
  id-token: write

env:
  BOYKISSER_VERSION: ${{ github.sha }}

jobs:
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: linux-x64
            arch: x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
            arch: arm64
          - os: macos-15
            target: darwin-arm64
            arch: arm64
          - os: macos-15
            target: darwin-x64
            arch: x64

    runs-on: ${{ matrix.os }}
    name: cli-${{ matrix.target }}

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build binary
        id: build
        run: ./packages/opencode/script/build.ts --single
        shell: bash

      - name: List dist contents
        run: ls -la packages/opencode/dist/ || echo "No dist yet"

      - name: Rename binary to boykisser
        shell: bash
        run: |
          cd packages/opencode/dist
          for dir in */; do
            if [ -d "$dir" ]; then
              dirname="${dir%/}"
              if [ -f "$dirname/bin/opencode" ]; then
                mv "$dirname/bin/opencode" "$dirname/bin/boykisser"
              elif [ -f "$dirname/bin/opencode.exe" ]; then
                mv "$dirname/bin/opencode.exe" "$dirname/bin/boykisser.exe"
              fi
              ln -sf boykisser "$dirname/bin/b" 2>/dev/null || true
              ln -sf boykisser "$dirname/bin/rin" 2>/dev/null || true
            fi
          done

      - name: Create archive
        shell: bash
        run: |
          cd packages/opencode/dist
          for dir in */; do
            dirname="${dir%/}"
            tar -czf "${dirname}.tar.gz" "$dirname/"
          done

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: boykisser-cli-${{ matrix.target }}
          path: packages/opencode/dist/
          if-no-files-found: warn

  build-desktop-windows:
    runs-on: windows-2025
    name: desktop-windows-x64
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Build CLI first (desktop dependency)
        run: ./packages/opencode/script/build.ts --single
        shell: bash

      - name: Build desktop app
        shell: bash
        run: |
          cd packages/desktop
          bun run prebuild
          bun run build
          npx electron-builder --win --config electron-builder.config.ts --publish never
        env:
          OPENCODE_CHANNEL: dev

      - name: List desktop dist
        shell: bash
        run: ls -la packages/desktop/dist/ || echo "No desktop dist"

      - name: Rename desktop installer
        shell: bash
        run: |
          cd packages/desktop/dist
          for f in *.exe; do
            if [ -f "$f" ]; then
              newname="Boykisser-desktop-windows-x64.exe"
              mv "$f" "$newname"
              echo "Renamed $f -> $newname"
            fi
          done
          for f in *.exe; do
            echo "✅ Desktop artifact: $f ($(stat -c%s "$f") bytes)"
          done

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: boykisser-desktop-windows-x64
          path: packages/desktop/dist/
          if-no-files-found: warn

  create-release:
    needs: [build-cli, build-desktop-windows]
    if: github.event_name == 'workflow_dispatch' && inputs.release == true
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Create Release
        run: |
          TAG="v1.2.0"
          FILES=$(find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.exe" \) | sort)
          gh release create "$TAG" $FILES \
            --title "Boykisser AI v1.2.0" \
            --notes "Boykisser AI v1.2.0 - Fully unrestricted AI coding agent"
        env:
          GH_TOKEN: ${{ github.token }}
